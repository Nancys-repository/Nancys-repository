.star-card{
background:white;
padding:30px;
margin:20px 0;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);

}
 
.star-card:hover{
transform:translateY(-6px);
}
 
/* star decoration */
 
.star-card:before{
content:"★";
color:#D4AF37;
font-size:28px;
position:absolute;
top:-15px;
left:-10px;
}
 
/* hidden content */
 
.hidden{

}
